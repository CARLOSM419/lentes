<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Realidad Mixta Avanzado</title>
    <style>
        body, html {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000; font-family: 'Courier New', Courier, monospace;
        }
        .contenedor-visor {
            position: relative; width: 100vw; height: 100vh;
        }
        video {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }
        canvas {
            position: absolute; width: 100%; height: 100%;
            object-fit: cover; z-index: 2;
            pointer-events: none;
        }
        .hud-barra-superior {
            position: absolute; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 3;
            background: rgba(0, 30, 15, 0.8);
            border: 1px solid #00ff66; border-radius: 4px;
            color: #00ff66; padding: 10px 25px; 
            text-align: center; font-size: 13px; font-weight: bold;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
            backdrop-filter: blur(5px); letter-spacing: 2px;
        }
        .parpadeo { animation: un-parpadeo 2s infinite; }
        @keyframes un-parpadeo { 
            0%, 100% { opacity: 1; } 50% { opacity: 0.5; } 
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>

    <div class="contenedor-visor">
        <div class="hud-barra-superior">
            SISTEMA DE ESCANEO ACTIVO <span class="parpadeo" id="estado-sistema" style="color: #fff; margin-left: 10px;">[ CARGANDO IA... ]</span>
        </div>

        <video id="camara-feed" autoplay playsinline muted></video>
        <canvas id="capa-dibujo"></canvas>
    </div>

    <script>
        // Diccionario completo de traducción
        const diccionarioEspanol = {
            "person": "persona", "bicycle": "bicicleta", "car": "carro", "motorcycle": "motocicleta",
            "airplane": "avión", "bus": "autobús", "train": "tren", "truck": "camión", "boat": "barco",
            "traffic light": "semáforo", "fire hydrant": "hidrante", "stop sign": "alto",
            "bench": "banca", "backpack": "mochila", "umbrella": "paraguas", "handbag": "bolso", 
            "tie": "corbata", "suitcase": "maleta", "sports ball": "pelota", "bottle": "botella", 
            "wine glass": "copa", "cup": "taza", "fork": "tenedor", "knife": "cuchillo", 
            "spoon": "cuchara", "bowl": "plato/tazón", "banana": "plátano", "apple": "manzana", 
            "sandwich": "sándwich", "orange": "naranja", "broccoli": "brócoli", "carrot": "zanahoria", 
            "chair": "silla", "couch": "sillón", "potted plant": "planta", "bed": "cama", 
            "dining table": "mesa", "tv": "pantalla/tv", "laptop": "portátil/laptop", "mouse": "mouse", 
            "remote": "control remoto", "keyboard": "teclado", "cell phone": "celular", "microwave": "microondas", 
            "oven": "horno", "refrigerator": "refrigerador", "book": "libro", "clock": "reloj", 
            "vase": "florero", "scissors": "tijeras", "teddy bear": "peluche", "toothbrush": "cepillo de dientes"
        };

        // === ESTA CLASE FUE LA QUE SE REESTRUCTURÓ PARA LOS LENTES VR ===
        class CamaraHardware {
            constructor(videoElementId) {
                this.video = document.getElementById(videoElementId);
            }
            async encender() {
                try {
                    // 1. Escaneamos la lista de cámaras físicas del dispositivo
                    const dispositivos = await navigator.mediaDevices.enumerateDevices();
                    const camaras = dispositivos.filter(device => device.kind === 'videoinput');
                    
                    let opcionesCamara = { audio: false, video: true };

                    if (camaras.length > 0) {
                        // Buscamos una cámara externa que apunte hacia el frente del visor (Passthrough)
                        let camaraExterna = camaras.find(c => 
                            c.label.toLowerCase().includes('back') || 
                            c.label.toLowerCase().includes('external') ||
                            c.label.toLowerCase().includes('passthrough') ||
                            c.label.toLowerCase().includes('ambiente')
                        );

                        // Si el navegador no da etiquetas con nombre, tomamos por defecto la última de la lista
                        if (!camaraExterna) {
                            camaraExterna = camaras[camaras.length - 1];
                        }

                        opcionesCamara.video = {
                            deviceId: { exact: camaraExterna.deviceId },
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        };
                    }

                    const stream = await navigator.mediaDevices.getUserMedia(opcionesCamara);
                    this.video.srcObject = stream;
                } catch (e) {
                    console.log("Fallo el mapeo manual, usando cámara por defecto...");
                    const streamRespaldo = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment" }, audio: false
                    });
                    this.video.srcObject = streamRespaldo;
                }
                return new Promise(resolve => this.video.onloadedmetadata = () => resolve(this.video));
            }
        }

        class ProcesadorIA {
            constructor() { this.modelo = null; }
            async cargarModelo() {
                this.modelo = await cocoSsd.load({ base: 'mobilenet_v2' });
            }
            async detectar(videoElemento) {
                tf.engine().startScope();
                const predicciones = await this.modelo.detect(videoElemento, 5, 0.45);
                tf.engine().endScope();
                return predicciones;
            }
        }

        class InterfazGrafica {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
            }
            escalar(ancho, alto) {
                this.canvas.width = ancho;
                this.canvas.height = alto;
            }
            limpiar() { this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); }
            
            dibujarHUD(objetos) {
                objetos.forEach(obj => {
                    const [x, y, ancho, alto] = obj.bbox;
                    const nombreEng = obj.class;
                    const nombreEsp = diccionarioEspanol[nombreEng] || nombreEng;
                    const porcen = Math.round(obj.score * 100);
                    
                    const colorHUD = (nombreEng === 'person') ? '#00f0ff' : '#00ff66';
                    
                    // Cuadro delimitador militar
                    this.ctx.strokeStyle = colorHUD;
                    this.ctx.lineWidth = 1.5;
                    this.ctx.strokeRect(x, y, ancho, alto);

                    // Esquinas reforzadas
                    this.ctx.fillStyle = colorHUD;
                    const l = Math.min(20, ancho * 0.2);
                    const g = 4;
                    this.ctx.fillRect(x - 1, y - 1, l, g); this.ctx.fillRect(x - 1, y - 1, g, l);
                    this.ctx.fillRect(x + ancho - l + 1, y - 1, l, g); this.ctx.fillRect(x + ancho - g + 1, y - 1, g, l);
                    this.ctx.fillRect(x - 1, y + alto - g + 1, l, g); this.ctx.fillRect(x - 1, y + alto - l + 1, g, l);
                    this.ctx.fillRect(x + ancho - l + 1, y + alto - g + 1, l, g); this.ctx.fillRect(x + ancho - g + 1, y + alto - l + 1, g, l);

                    // Líneas guía punteadas
                    this.ctx.save();
                    this.ctx.strokeStyle = colorHUD;
                    this.ctx.setLineDash([4, 4]);
                    this.ctx.lineWidth = 1;
                    
                    const posXData = x + ancho + 30;
                    const posYData = y + 20;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x + ancho, y + 20);
                    this.ctx.lineTo(posXData, posYData);
                    this.ctx.stroke();
                    this.ctx.restore();

                    // Etiqueta lateral flotante de datos
                    this.ctx.fillStyle = "rgba(0, 15, 5, 0.75)";
                    this.ctx.strokeStyle = colorHUD;
                    this.ctx.lineWidth = 1;
                    
                    const txtCabecera = `[${(nombreEng === 'person' ? 'OBJ-HUMANO' : 'OBJ-ENTORNO')}]`;
                    const txtDetalle = `${nombreEsp.toUpperCase()} : ${porcen}%`;
                    
                    const anchoCaja = Math.max(this.ctx.measureText(txtCabecera).width, this.ctx.measureText(txtDetalle).width) + 15;
                    const altoCaja = 40;

                    this.fillRect(posXData, posYData - 15, anchoCaja, altoCaja);
                    this.ctx.fillRect(posXData, posYData - 15, anchoCaja, altoCaja);
                    this.ctx.strokeRect(posXData, posYData - 15, anchoCaja, altoCaja);

                    this.ctx.font = "bold 11px 'Courier New', monospace";
                    this.ctx.fillStyle = colorHUD;
                    this.ctx.fillText(txtCabecera, posXData + 8, posYData - 2);
                    
                    this.ctx.font = "12px 'Courier New', monospace";
                    this.ctx.fillStyle = "#ffffff";
                    this.ctx.fillText(txtDetalle, posXData + 8, posYData + 14);
                });
            }
        }

        class AplicacionEscaner {
            constructor() {
                this.hardware = new CamaraHardware('camara-feed');
                this.ia = new ProcesadorIA();
                this.gui = new InterfazGrafica('capa-dibujo');
                this.txtEstado = document.getElementById('estado-sistema');
            }

            async ejecutar() {
                try {
                    await this.hardware.encender();
                    await this.ia.cargarModelo();
                    
                    this.txtEstado.innerText = "[ ONLINE ]";
                    this.txtEstado.style.color = "#00ff66";
                    
                    this.gui.escalar(this.hardware.video.videoWidth, this.hardware.video.videoHeight);
                    this.bucleEscaneo();
                } catch (err) {
                    this.txtEstado.innerText = "[ ERROR DE RECONOCIMIENTO ]";
                    this.txtEstado.style.color = "#ff3333";
                    console.error(err);
                }
            }

            async bucleEscaneo() {
                this.gui.limpiar();
                const hallazgos = await this.ia.detectar(this.hardware.video);
                this.gui.dibujarHUD(hallazgos);
                setTimeout(() => requestAnimationFrame(() => this.bucleEscaneo()), 1000 / 30);
            }
        }

        const sistema = new AplicacionEscaner();
        window.addEventListener('DOMContentLoaded', () => sistema.ejecutar());
    </script>
</body>
</html>
